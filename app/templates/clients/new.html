{% extends 'base.html' %} {% block title %}Nuevo cliente | Fact Ansys 1.0{% endblock %} {% block
content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="mb-4">
      <a href="{{ url_for('clients.index') }}" class="text-decoration-none text-secondary small">
        <i class="bi bi-arrow-left me-1"></i>Volver a clientes
      </a>
    </div>
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4 p-lg-5">
        <h2 class="fw-bold mb-1">Nuevo cliente</h2>
        <p class="text-secondary mb-4">Los datos de este cliente estarán aislados de los demás.</p>

        <form method="post" class="d-grid gap-3">
          <div>
            <label class="form-label fw-semibold"
              >Nombre del cliente <span class="text-danger">*</span></label
            >
            <input
              class="form-control form-control-lg"
              type="text"
              name="name"
              placeholder="Ej. Empresa ABC S.A."
              required
              value="{{ request.form.get('name', '') }}"
            />
          </div>
          <div>
            <label class="form-label fw-semibold">RUC / NIT</label>
            <input
              class="form-control"
              type="text"
              name="ruc"
              placeholder="Ej. 8-723-456"
              value="{{ request.form.get('ruc', '') }}"
            />
          </div>
          <div>
            <label class="form-label fw-semibold">Descripción</label>
            <textarea
              class="form-control"
              name="description"
              rows="3"
              placeholder="Notas internas sobre este cliente..."
            >
{{ request.form.get('description', '') }}</textarea
            >
          </div>
          <div class="d-flex gap-2 pt-2">
            <button class="btn btn-dark flex-grow-1" type="submit">
              <i class="bi bi-check-lg me-1"></i>Crear cliente
            </button>
            <a href="{{ url_for('clients.index') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
