<form class="card border-0 shadow-sm rounded-4 mb-4" method="get">
  <div class="card-body row g-3 align-items-end">
    <div class="col-lg-3">
      <label class="form-label">Emisor</label>
      <input
        class="form-control"
        type="search"
        name="nombre_de_emisor"
        value="{{ filters.nombre_de_emisor }}"
        placeholder="Buscar por nombre de emisor"
      />
    </div>
    <div class="col-lg-2 col-md-4">
      <label class="form-label">Numero RUC</label>
      <input
        class="form-control"
        type="search"
        name="numero_ruc"
        value="{{ filters.numero_ruc }}"
        placeholder="Ej. 155628108"
      />
    </div>
    <div class="col-lg-2 col-md-4">
      <label class="form-label">Usuario</label>
      <input
        class="form-control"
        type="search"
        name="usuario"
        value="{{ filters.usuario }}"
        placeholder="Usuario"
      />
    </div>
    <div class="col-lg-2 col-md-4">
      <label class="form-label">Desde</label>
      <input
        class="form-control"
        type="date"
        name="fecha_inicio"
        value="{{ filters.fecha_inicio }}"
      />
    </div>
    <div class="col-lg-2 col-md-4">
      <label class="form-label">Hasta</label>
      <input class="form-control" type="date" name="fecha_fin" value="{{ filters.fecha_fin }}" />
    </div>
    <div class="col-lg-3 col-md-4">
      <label class="form-label">Tipo documento</label>
      <select class="form-select" name="tipo_documento">
        <option value="">Todos</option>
        {% for doc_type in document_types %}
        <option value="{{ doc_type }}" {% if filters.tipo_documento == doc_type %}selected{% endif %}>
          {{ doc_type }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-lg-2 col-md-4 d-grid">
      <button class="btn btn-dark" type="submit">Filtrar</button>
    </div>
    <div class="col-lg-12 d-flex justify-content-end">
      <a
        class="btn btn-outline-secondary btn-sm"
        href="{{ url_for('dashboard.export_csv', **filters) }}"
      >
        Exportar CSV
      </a>
    </div>
  </div>
</form>
